<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBC Asia Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a73e8;
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        /* 仲裁申请提示条 */
        .notice-bar {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-bottom: 2px solid #ff9800;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .notice-bar .notice-icon {
            font-size: 20px;
        }
        .notice-bar .notice-text {
            color: #e65100;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
        }
        .notice-bar .btn-appeal {
            padding: 8px 20px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .notice-bar .btn-appeal:hover {
            background: #f57c00;
            transform: translateY(-1px);
        }
        .container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
        }
        .iframe-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .iframe-wrapper iframe {
            display: block;
            width: 100%;
            min-height: 533px;
            height: 80vh;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>
    <header>
        <h1>JBC Asia Leaderboard</h1>
    </header>
    
    <!-- 仲裁申请提示条 -->
    <div class="notice-bar">
        <span class="notice-icon">⚠️</span>
        <span class="notice-text">该记录可能因为成绩复核发生变化。如需反馈修正，请点击按钮填写仲裁申请。</span>
        <a href="https://shuju.itccc.org.cn/f/ERgplT" target="_blank" class="btn-appeal">
            填写仲裁申请 →
        </a>
    </div>
    
    <div class="container">
        <div class="iframe-wrapper">
            <iframe class="dingtalk-embed" src="https://alidocs.dingtalk.com/aitable/share/view/v01Yvenve5BXM8Q4loy_hERWDMS_icGN2tm?dd_full_screen=true" frameborder="0" width="100%" height="533" style="background: transparent; border: none;"></iframe>
        </div>
    </div>
</body>
</html>
