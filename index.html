<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBC Asia Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a73e8;
            color: white;
            padding: 20px 20px 0;
            text-align: center;
        }
        header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 4px;
        }
        .tab-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }
        .tab-btn.active {
            background: #f5f5f5;
            color: #1a73e8;
        }
        .container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
        }
        .iframe-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: none;
        }
        .iframe-wrapper.active {
            display: block;
        }
        .iframe-wrapper iframe {
            display: block;
            width: 100%;
            min-height: 533px;
            height: 80vh;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>
    <header>
        <h1>JBC Asia Leaderboard</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">Page 1</button>
            <button class="tab-btn" onclick="switchTab(1)">Page 2</button>
        </div>
    </header>
    <div class="container">
        <div class="iframe-wrapper active" id="page-0">
            <iframe class="dingtalk-embed" src="https://alidocs.dingtalk.com/aitable/share/view/v01jP2lRYjr5kdz6O8g_P5DsLP5_MGfHjsS?dd_full_screen=true" frameborder="0" width="100%" height="533" style="background: transparent; border: none;"></iframe>
        </div>
        <div class="iframe-wrapper" id="page-1">
            <iframe class="dingtalk-embed" src="https://alidocs.dingtalk.com/aitable/share/view/v01jP2lRYjr5kdz6O8g_VVF6tDB_ZRVE8KP?dd_full_screen=true" frameborder="0" width="100%" height="533" style="background: transparent; border: none;"></iframe>
        </div>
    </div>
    <script>
        function switchTab(index) {
            document.querySelectorAll('.tab-btn').forEach(function(btn, i) {
                btn.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.iframe-wrapper').forEach(function(wrapper, i) {
                wrapper.classList.toggle('active', i === index);
            });
        }
    </script>
</body>
</html>
