<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBC Asia Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a73e8;
            color: white;
            padding: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-presentation {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-presentation:hover {
            background: rgba(255, 255, 255, 0.35);
        }
        .btn-presentation.active {
            background: #fff;
            color: #1a73e8;
            border-color: #fff;
        }
        /* 仲裁申请提示条 */
        .notice-bar {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-bottom: 2px solid #ff9800;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .notice-bar .notice-icon {
            font-size: 20px;
        }
        .notice-bar .notice-text {
            color: #e65100;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
        }
        .notice-bar .btn-appeal {
            padding: 8px 20px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .notice-bar .btn-appeal:hover {
            background: #f57c00;
            transform: translateY(-1px);
        }
        .container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
        }
        .iframe-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .iframe-wrapper iframe {
            display: block;
            width: 100%;
            min-height: 533px;
            height: 80vh;
            border: none;
            background: transparent;
        }
        /* Presentation mode overlay */
        .presentation-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #0d1117;
            flex-direction: column;
        }
        .presentation-overlay.active {
            display: flex;
        }
        .presentation-toolbar {
            background: #161b22;
            color: #e6edf3;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #30363d;
            flex-shrink: 0;
        }
        .presentation-toolbar .left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .presentation-toolbar .title {
            font-size: 18px;
            font-weight: 600;
        }
        .presentation-toolbar .status {
            font-size: 13px;
            color: #8b949e;
        }
        .presentation-toolbar .status .highlight {
            color: #58a6ff;
            font-weight: 600;
        }
        .presentation-toolbar .right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .pres-btn {
            padding: 6px 14px;
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s, border-color 0.15s;
        }
        .pres-btn:hover {
            background: #30363d;
            border-color: #484f58;
        }
        .pres-btn.danger {
            color: #f85149;
            border-color: #f8514933;
        }
        .pres-btn.danger:hover {
            background: #f8514922;
            border-color: #f85149;
        }
        .pres-btn.primary {
            background: #1f6feb;
            border-color: #1f6feb;
            color: #fff;
        }
        .pres-btn.primary:hover {
            background: #388bfd;
        }
        .pres-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .settings-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #8b949e;
        }
        .settings-row label {
            white-space: nowrap;
        }
        .settings-row select,
        .settings-row input[type="number"] {
            padding: 4px 8px;
            background: #0d1117;
            color: #e6edf3;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 13px;
            width: 70px;
        }
        .presentation-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .presentation-content iframe {
            position: absolute;
            width: 100%;
            border: none;
            background: white;
            transition: top 0.8s ease-in-out;
        }
        .page-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .countdown-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #58a6ff;
            transition: width linear;
            z-index: 10;
        }
    </style>
</head>
<body>
    <header>
        <h1>JBC Asia Leaderboard</h1>
        <div class="header-actions">
            <button class="btn-presentation" onclick="openPresentation()">展示模式</button>
        </div>
    </header>
    
    <!-- 仲裁申请提示条 -->
    <div class="notice-bar">
        <span class="notice-icon">⚠️</span>
        <span class="notice-text">该记录可能因为成绩复核发生变化。如需反馈修正，请点击按钮填写仲裁申请。</span>
        <a href="https://shuju.itccc.org.cn/f/ERgplT" target="_blank" class="btn-appeal">
            填写仲裁申请 →
        </a>
    </div>
    
    <div class="container">
        <div class="iframe-wrapper">
            <iframe class="dingtalk-embed" src="https://alidocs.dingtalk.com/aitable/share/view/v01Yvenve5BXM8Q4loy_hERWDMS_icGN2tm?dd_full_screen=true" frameborder="0" width="100%" height="533" style="background: transparent; border: none;"></iframe>
        </div>
    </div>
    
    <!-- Presentation Mode Overlay -->
    <div class="presentation-overlay" id="presentationOverlay">
        <div class="presentation-toolbar">
            <div class="left">
                <span class="title">JBC Asia Leaderboard - 展示模式</span>
                <span class="status" id="presStatus">已暂停</span>
            </div>
            <div class="right">
                <div class="settings-row">
                    <label for="rowsPerPage">每页行数:</label>
                    <input type="number" id="rowsPerPage" value="20" min="5" max="100" step="5">
                </div>
                <div class="settings-row">
                    <label for="intervalSeconds">翻页间隔(秒):</label>
                    <input type="number" id="intervalSeconds" value="10" min="3" max="60" step="1">
                </div>
                <button class="pres-btn primary" id="btnPlayPause" onclick="togglePlay()">开始</button>
                <button class="pres-btn" onclick="prevPage()">上一页</button>
                <button class="pres-btn" onclick="nextPage()">下一页</button>
                <button class="pres-btn" onclick="refreshIframe()">刷新数据</button>
                <button class="pres-btn danger" onclick="closePresentation()">退出</button>
            </div>
        </div>
        <div class="presentation-content" id="presContent">
            <iframe id="presIframe" src="" frameborder="0"></iframe>
            <div class="page-indicator" id="pageIndicator"></div>
            <div class="countdown-bar" id="countdownBar"></div>
        </div>
    </div>
    
    <script>
        var IFRAME_SRC = 'https://alidocs.dingtalk.com/aitable/share/view/v01Yvenve5BXM8Q4loy_hERWDMS_icGN2tm?dd_full_screen=true';
        var ROW_HEIGHT = 36;
        var HEADER_HEIGHT = 90;
        var state = {
            isOpen: false,
            isPlaying: false,
            currentPage: 0,
            totalPages: 1,
            timer: null,
            countdownTimer: null,
            countdownStart: 0
        };
        function getRowsPerPage() {
            return parseInt(document.getElementById('rowsPerPage').value) || 20;
        }
        function getIntervalSeconds() {
            return parseInt(document.getElementById('intervalSeconds').value) || 10;
        }
        function openPresentation() {
            var overlay = document.getElementById('presentationOverlay');
            overlay.classList.add('active');
            state.isOpen = true;
            state.currentPage = 0;
            var iframe = document.getElementById('presIframe');
            var container = document.getElementById('presContent');
            var containerHeight = container.offsetHeight;
            var iframeHeight = containerHeight * 20;
            iframe.style.height = iframeHeight + 'px';
            iframe.style.top = '0px';
            iframe.src = IFRAME_SRC;
            iframe.onload = function() {
                calculatePages();
                updatePageIndicator();
            };
            updatePageIndicator();
            document.addEventListener('keydown', handleKeyDown);
        }
        function closePresentation() {
            var overlay = document.getElementById('presentationOverlay');
            overlay.classList.remove('active');
            state.isOpen = false;
            stopAutoPlay();
            var iframe = document.getElementById('presIframe');
            iframe.src = '';
            document.removeEventListener('keydown', handleKeyDown);
        }
        function calculatePages() {
            var container = document.getElementById('presContent');
            var containerHeight = container.offsetHeight;
            var rowsPerPage = getRowsPerPage();
            var visibleContentHeight = rowsPerPage * ROW_HEIGHT;
            var estimatedTotalRows = 200;
            state.totalPages = Math.max(1, Math.ceil(estimatedTotalRows / rowsPerPage));
        }
        function goToPage(page) {
            var container = document.getElementById('presContent');
            var containerHeight = container.offsetHeight;
            var rowsPerPage = getRowsPerPage();
            var scrollOffset = page * rowsPerPage * ROW_HEIGHT;
            var iframe = document.getElementById('presIframe');
            iframe.style.top = -scrollOffset + 'px';
            state.currentPage = page;
            updatePageIndicator();
        }
        function nextPage() {
            var next = state.currentPage + 1;
            if (next >= state.totalPages) {
                refreshIframe();
                state.currentPage = 0;
                goToPage(0);
            } else {
                goToPage(next);
            }
            resetCountdown();
        }
        function prevPage() {
            if (state.currentPage > 0) {
                goToPage(state.currentPage - 1);
            }
            resetCountdown();
        }
        function refreshIframe() {
            var iframe = document.getElementById('presIframe');
            var sep = IFRAME_SRC.indexOf('?') > -1 ? '&' : '?';
            iframe.src = IFRAME_SRC + sep + '_t=' + Date.now();
            iframe.onload = function() {
                calculatePages();
                updatePageIndicator();
            };
        }
        function updatePageIndicator() {
            var indicator = document.getElementById('pageIndicator');
            indicator.textContent = '第 ' + (state.currentPage + 1) + ' / ' + state.totalPages + ' 页  ·  每页 ' + getRowsPerPage() + ' 条';
        }
        function togglePlay() {
            if (state.isPlaying) {
                stopAutoPlay();
            } else {
                startAutoPlay();
            }
        }
        function startAutoPlay() {
            state.isPlaying = true;
            document.getElementById('btnPlayPause').textContent = '暂停';
            document.getElementById('presStatus').innerHTML = '自动播放中 · 每 <span class="highlight">' + getIntervalSeconds() + '</span> 秒翻页';
            resetCountdown();
            scheduleNextPage();
        }
        function stopAutoPlay() {
            state.isPlaying = false;
            document.getElementById('btnPlayPause').textContent = '开始';
            document.getElementById('presStatus').textContent = '已暂停';
            clearTimeout(state.timer);
            clearInterval(state.countdownTimer);
            document.getElementById('countdownBar').style.width = '0%';
        }
        function scheduleNextPage() {
            clearTimeout(state.timer);
            var interval = getIntervalSeconds() * 1000;
            state.timer = setTimeout(function() {
                if (state.isPlaying) {
                    nextPage();
                    scheduleNextPage();
                }
            }, interval);
            startCountdownBar(interval);
        }
        function startCountdownBar(duration) {
            var bar = document.getElementById('countdownBar');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            bar.offsetWidth;
            bar.style.transition = 'width ' + (duration / 1000) + 's linear';
            bar.style.width = '0%';
        }
        function resetCountdown() {
            if (state.isPlaying) {
                clearTimeout(state.timer);
                scheduleNextPage();
            }
        }
        function handleKeyDown(e) {
            if (!state.isOpen) return;
            switch (e.key) {
                case 'ArrowRight':
                case 'ArrowDown':
                case ' ':
                    e.preventDefault();
                    nextPage();
                    break;
                case 'ArrowLeft':
                case 'ArrowUp':
                    e.preventDefault();
                    prevPage();
                    break;
                case 'Escape':
                    closePresentation();
                    break;
                case 'p':
                    togglePlay();
                    break;
                case 'r':
                    refreshIframe();
                    break;
            }
        }
        document.getElementById('rowsPerPage').addEventListener('change', function() {
            calculatePages();
            goToPage(0);
            if (state.isPlaying) {
                document.getElementById('presStatus').innerHTML = '自动播放中 · 每 <span class="highlight">' + getIntervalSeconds() + '</span> 秒翻页';
            }
        });
        document.getElementById('intervalSeconds').addEventListener('change', function() {
            if (state.isPlaying) {
                resetCountdown();
                document.getElementById('presStatus').innerHTML = '自动播放中 · 每 <span class="highlight">' + getIntervalSeconds() + '</span> 秒翻页';
            }
        });
    </script>
</body>
</html>
